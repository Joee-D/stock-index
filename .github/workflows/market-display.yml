name: Market Display

on:
  schedule:
    # 每 10 分钟运行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ZECTRIX_API_KEY: ${{ secrets.ZECTRIX_API_KEY }}
      DEVICE_ID: ${{ secrets.DEVICE_ID }}
      # 可选：自定义推送 URL（若需要覆盖默认）
      # ZECTRIX_URL: ${{ secrets.ZECTRIX_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market display (push)
        run: |
          python scripts/market_display.py
